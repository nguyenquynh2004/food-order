<!DOCTYPE html>
<html lang="vi">

<head>

    <meta charset="UTF-8">

    <meta 
        name="viewport" 
        content="width=device-width, initial-scale=1.0"
    >

    <title>Food Order System</title>

    <style>

        body{

            font-family: Arial;

            background: #f4f4f4;

            margin: 0;

            padding: 20px;

        }

        h1{

            text-align: center;

        }

        form,
        .food,
        .card{

            background: white;

            padding: 20px;

            border-radius: 10px;

            margin-bottom: 20px;

            box-shadow: 0 0 10px rgba(0,0,0,0.1);

        }

        input{

            width: 100%;

            padding: 12px;

            margin: 10px 0;

            box-sizing: border-box;

        }

        button{

            padding: 10px 20px;

            border: none;

            border-radius: 5px;

            color: white;

            cursor: pointer;

            margin-right: 5px;

            margin-top: 10px;

        }

        .add-btn{

            background: green;

        }

        .edit-btn{

            background: orange;

        }

        .delete-btn{

            background: red;

        }

        .foods{

            display: grid;

            grid-template-columns: repeat(3,1fr);

            gap: 20px;

        }

        img{

            width: 100%;

            height: 200px;

            object-fit: cover;

            border-radius: 10px;

        }

        .dashboard{

            display: grid;

            grid-template-columns: repeat(3,1fr);

            gap: 20px;

            margin-bottom: 20px;

        }

        .card{

            text-align: center;

        }

        .card h2{

            color: green;

            font-size: 35px;

        }

        #cart{

            margin-top: 20px;

        }

        @media(max-width:768px){

            .foods{

                grid-template-columns: 1fr;

            }

            .dashboard{

                grid-template-columns: 1fr;

            }

        }

    </style>

</head>

<body>

    <!-- LOGIN -->
    <h1>🔐 Admin Login</h1>

    <div class="food">

        <input 
            type="text"
            id="username"
            placeholder="Tên đăng nhập"
        >

        <input 
            type="password"
            id="password"
            placeholder="Mật khẩu"
        >

        <button 
            class="add-btn"
            onclick="login()"
        >
            Đăng nhập
        </button>

    </div>

    <!-- TITLE -->
    <h1>🍔 Food Order System</h1>

    <!-- DASHBOARD -->
    <div class="dashboard">

        <div class="card">

            <h2 id="totalFoods">0</h2>

            <p>Tổng món ăn</p>

        </div>

        <div class="card">

            <h2 id="totalOrders">0</h2>

            <p>Tổng đơn hàng</p>

        </div>

        <div class="card">

            <h2 id="totalRevenue">0 VNĐ</h2>

            <p>Tổng doanh thu</p>

        </div>

    </div>

    <!-- FORM -->
    <form id="foodForm" style="display:none;">

        <input 
            type="text" 
            id="name" 
            placeholder="Tên món ăn"
            required
        >

        <input 
            type="number" 
            id="price" 
            placeholder="Giá món ăn"
            required
        >

        <input 
            type="file" 
            id="image"
        >

        <input 
            type="text" 
            id="description" 
            placeholder="Mô tả món ăn"
        >

        <button 
            class="add-btn" 
            type="submit"
        >
            Thêm món ăn
        </button>

    </form>

    <!-- SEARCH -->
    <input 
        type="text"
        id="search"
        placeholder="🔍 Tìm món ăn..."
    >

    <br><br>

    <!-- FOODS -->
    <div 
        class="foods" 
        id="foods"
    >
    </div>

    <!-- CART -->
    <h1>🛒 Giỏ Hàng</h1>

    <div id="cart"></div>

    <h2 id="total">
        Tổng tiền: 0 VNĐ
    </h2>

    <!-- CHECKOUT -->
    <input 
        type="text"
        id="customerName"
        placeholder="Tên khách hàng"
    >

    <button 
        class="add-btn"
        onclick="checkout()"
    >
        Đặt hàng
    </button>

    <!-- ORDERS -->
    <h1>📦 Đơn Hàng</h1>

    <div id="orders"></div>

    <script>

        let foodsData = [];

        let cart = [];

        // LOGIN
        function login(){

            const username =
            document.getElementById("username").value;

            const password =
            document.getElementById("password").value;

            fetch("http://localhost:3000/login", {

                method: "POST",

                headers: {

                    "Content-Type": "application/json"

                },

                body: JSON.stringify({

                    username,
                    password

                })

            })
            .then(res => res.json())
            .then(data => {

                alert(data.message);

                if(data.success){

                    localStorage.setItem(
                        "admin",
                        "true"
                    );

                    document
                    .getElementById("foodForm")
                    .style.display = "block";

                }

            });

        }

        // HIỆN FORM NẾU ĐÃ LOGIN
        if(localStorage.getItem("admin") === "true"){

            document
            .getElementById("foodForm")
            .style.display = "block";

        }

        // DASHBOARD
        function loadDashboard(){

            fetch("http://localhost:3000/dashboard")
            .then(res => res.json())
            .then(data => {

                document
                .getElementById("totalFoods")
                .innerHTML = data.totalFoods;

                document
                .getElementById("totalOrders")
                .innerHTML = data.totalOrders;

                document
                .getElementById("totalRevenue")
                .innerHTML = data.totalRevenue + " VNĐ";

            });

        }

        loadDashboard();

        // LOAD FOODS
        function loadFoods(){

            fetch("http://localhost:3000/foods")
            .then(res => res.json())
            .then(data => {

                foodsData = data;

                const foods =
                document.getElementById("foods");

                foods.innerHTML = "";

                data.forEach(food => {

                    foods.innerHTML += `
                    
                        <div class="food">

                            <img 
                                src="${food.image || 'https://via.placeholder.com/300'}"
                            >

                            <h2>${food.name}</h2>

                            <p>${food.description}</p>

                            <h3>${food.price} VNĐ</h3>

                            <button 
                                class="add-btn"
                                onclick="addToCart(
                                    ${food.id},
                                    '${food.name}',
                                    ${food.price}
                                )"
                            >
                                Thêm vào giỏ
                            </button>

                            <button 
                                class="edit-btn"
                                onclick="editFood(
                                    ${food.id},
                                    '${food.name}',
                                    '${food.price}',
                                    '${food.image}',
                                    '${food.description}'
                                )"
                            >
                                Sửa
                            </button>

                            <button 
                                class="delete-btn"
                                onclick="deleteFood(${food.id})"
                            >
                                Xóa
                            </button>

                        </div>
                    
                    `;

                });

            });

        }

        loadFoods();

        // ADD FOOD
        document
        .getElementById("foodForm")
        .addEventListener(
            "submit",
            async function(e){

            e.preventDefault();

            const imageFile =
            document.getElementById("image")
            .files[0];

            let imageUrl = "";

            if(imageFile){

                const formData = new FormData();

                formData.append(
                    "image",
                    imageFile
                );

                const uploadRes =
                await fetch(
                    "http://localhost:3000/upload",
                    {

                        method: "POST",

                        body: formData

                    }
                );

                const uploadData =
                await uploadRes.json();

                imageUrl =
                uploadData.imageUrl;

            }

            const food = {

                name:
                document
                .getElementById("name")
                .value,

                price:
                document
                .getElementById("price")
                .value,

                image: imageUrl,

                description:
                document
                .getElementById("description")
                .value

            };

            fetch("http://localhost:3000/foods", {

                method: "POST",

                headers: {

                    "Content-Type": "application/json"

                },

                body: JSON.stringify(food)

            })
            .then(res => res.text())
            .then(data => {

                alert(data);

                loadFoods();

                loadDashboard();

                document
                .getElementById("foodForm")
                .reset();

            });

        });

        // DELETE FOOD
        function deleteFood(id){

            if(confirm("Bạn chắc chắn muốn xóa?")){

                fetch(
                    `http://localhost:3000/foods/${id}`,
                    {

                        method: "DELETE"

                    }
                )
                .then(res => res.text())
                .then(data => {

                    alert(data);

                    loadFoods();

                    loadDashboard();

                });

            }

        }

        // EDIT FOOD
        function editFood(
            id,
            oldName,
            oldPrice,
            oldImage,
            oldDescription
        ){

            const name =
            prompt(
                "Tên món ăn:",
                oldName
            );

            const price =
            prompt(
                "Giá món ăn:",
                oldPrice
            );

            const image =
            prompt(
                "Link ảnh:",
                oldImage
            );

            const description =
            prompt(
                "Mô tả:",
                oldDescription
            );

            const food = {

                name,
                price,
                image,
                description

            };

            fetch(
                `http://localhost:3000/foods/${id}`,
                {

                    method: "PUT",

                    headers: {

                        "Content-Type":
                        "application/json"

                    },

                    body: JSON.stringify(food)

                }
            )
            .then(res => res.text())
            .then(data => {

                alert(data);

                loadFoods();

            });

        }

        // SEARCH
        document
        .getElementById("search")
        .addEventListener(
            "keyup",
            function(){

            const keyword =
            this.value.toLowerCase();

            const foods =
            document.getElementById("foods");

            foods.innerHTML = "";

            const filteredFoods =
            foodsData.filter(food =>

                food.name
                .toLowerCase()
                .includes(keyword)

            );

            filteredFoods.forEach(food => {

                foods.innerHTML += `
                
                    <div class="food">

                        <img 
                            src="${food.image || 'https://via.placeholder.com/300'}"
                        >

                        <h2>${food.name}</h2>

                        <p>${food.description}</p>

                        <h3>${food.price} VNĐ</h3>

                    </div>
                
                `;

            });

        });

        // ADD TO CART
        function addToCart(
            id,
            name,
            price
        ){

            const found =
            cart.find(item => item.id === id);

            if(found){

                found.quantity++;

            }else{

                cart.push({

                    id,
                    name,
                    price,
                    quantity: 1

                });

            }

            renderCart();

        }

        // RENDER CART
        function renderCart(){

            const cartDiv =
            document.getElementById("cart");

            const totalDiv =
            document.getElementById("total");

            cartDiv.innerHTML = "";

            let total = 0;

            cart.forEach(item => {

                total +=
                item.price * item.quantity;

                cartDiv.innerHTML += `
                
                    <div class="food">

                        <h2>${item.name}</h2>

                        <p>
                            Giá:
                            ${item.price} VNĐ
                        </p>

                        <p>
                            Số lượng:
                            ${item.quantity}
                        </p>

                        <button 
                            class="edit-btn"
                            onclick="increaseQuantity(
                                ${item.id}
                            )"
                        >
                            +
                        </button>

                        <button 
                            class="delete-btn"
                            onclick="decreaseQuantity(
                                ${item.id}
                            )"
                        >
                            -
                        </button>

                        <button 
                            class="delete-btn"
                            onclick="removeFromCart(
                                ${item.id}
                            )"
                        >
                            Xóa
                        </button>

                    </div>
                
                `;

            });

            totalDiv.innerHTML =
            `Tổng tiền: ${total} VNĐ`;

        }

        // INCREASE
        function increaseQuantity(id){

            const item =
            cart.find(item => item.id === id);

            item.quantity++;

            renderCart();

        }

        // DECREASE
        function decreaseQuantity(id){

            const item =
            cart.find(item => item.id === id);

            if(item.quantity > 1){

                item.quantity--;

            }

            renderCart();

        }

        // REMOVE CART
        function removeFromCart(id){

            cart =
            cart.filter(
                item => item.id !== id
            );

            renderCart();

        }

        // CHECKOUT
        function checkout(){

            if(cart.length === 0){

                alert("Giỏ hàng trống");

                return;

            }

            const customerName =
            document
            .getElementById("customerName")
            .value;

            let total = 0;

            cart.forEach(item => {

                total +=
                item.price * item.quantity;

            });

            fetch(
                "http://localhost:3000/orders",
                {

                    method: "POST",

                    headers: {

                        "Content-Type":
                        "application/json"

                    },

                    body: JSON.stringify({

                        customer_name:
                        customerName,

                        total_price: total

                    })

                }
            )
            .then(res => res.text())
            .then(data => {

                alert(data);

                cart = [];

                renderCart();

                loadOrders();

                loadDashboard();

            });

        }

        // LOAD ORDERS
        function loadOrders(){

            fetch(
                "http://localhost:3000/orders"
            )
            .then(res => res.json())
            .then(data => {

                const ordersDiv =
                document.getElementById(
                    "orders"
                );

                ordersDiv.innerHTML = "";

                data.forEach(order => {

                    ordersDiv.innerHTML += `
                    
                        <div class="food">

                            <h2>
                                👤 
                                ${order.customer_name}
                            </h2>

                            <h3>
                                💰 
                                ${order.total_price}
                                VNĐ
                            </h3>

                            <p>
                                🕒
                                ${order.created_at}
                            </p>

                        </div>
                    
                    `;

                });

            });

        }

        loadOrders();

    </script>

</body>

</html>
