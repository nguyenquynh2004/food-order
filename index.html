<!DOCTYPE html>
<html lang="vi">

<head>

    <meta charset="UTF-8">

    <title>Food Order System</title>

    <style>

        body{

            font-family: Arial;
            background: #f2f2f2;
            margin: 0;
            padding: 20px;

        }

        h1{

            text-align: center;

        }

        .container{

            max-width: 1200px;
            margin: auto;

        }

        input, button{

            padding: 12px;
            margin: 5px;
            width: 100%;

        }

        button{

            background: green;
            color: white;
            border: none;
            cursor: pointer;

        }

        .foods{

            display: grid;
            grid-template-columns: repeat(auto-fit,minmax(250px,1fr));
            gap: 20px;

        }

        .food{

            background: white;
            padding: 15px;
            border-radius: 10px;

        }

        .food img{

            width: 100%;
            height: 200px;
            object-fit: cover;
            border-radius: 10px;

        }

    </style>

</head>

<body>

<div class="container">

    <h1>🍔 Food Order System</h1>

    <!-- LOGIN -->

    <h2>🔐 Admin Login</h2>

    <input type="text" id="username" placeholder="Username">

    <input type="password" id="password" placeholder="Password">

    <button onclick="login()">
    
        Đăng nhập
    
    </button>

    <!-- ADD FOOD -->

    <div id="foodForm" style="display:none;">

        <h2>➕ Thêm món ăn</h2>

        <input type="text" id="name" placeholder="Tên món ăn">

        <input type="number" id="price" placeholder="Giá">

        <input type="text" id="image" placeholder="Link ảnh">

        <input type="text" id="description" placeholder="Mô tả">

        <button onclick="addFood()">

            Thêm món ăn

        </button>

    </div>

    <!-- FOODS -->

    <h2>🍟 Danh sách món ăn</h2>

    <div class="foods" id="foods"></div>

</div>

<script>

const API = "https://food-order-718c.onrender.com";

let cart = [];

function login(){

    const username =
    document.getElementById("username").value;

    const password =
    document.getElementById("password").value;

    fetch(`${API}/login`, {

        method: "POST",

        headers: {

            "Content-Type": "application/json"

        },

        body: JSON.stringify({

            username,
            password

        })

    })

    .then(res => res.json())

    .then(data => {

        alert(data.message);

        if(data.success){

            document
            .getElementById("foodForm")
            .style.display = "block";

        }

    });

}

function addFood(){

    const name =
    document.getElementById("name").value;

    const price =
    document.getElementById("price").value;

    const image =
    document.getElementById("image").value;

    const description =
    document.getElementById("description").value;

    fetch(`${API}/foods`, {

        method: "POST",

        headers: {

            "Content-Type": "application/json"

        },

        body: JSON.stringify({

            name,
            price,
            image,
            description

        })

    })

    .then(res => res.json())

    .then(data => {

        alert(data.message);

        loadFoods();

    });

}

function loadFoods(){

    fetch(`${API}/foods`)

    .then(res => res.json())

    .then(data => {

        let html = "";

        data.forEach(food => {

            html += `
            
                <div class="food">

                    <img src="${food.image}">

                    <h3>${food.name}</h3>

                    <p>${food.description}</p>

                    <h2>${food.price} VNĐ</h2>

                </div>

            `;

        });

        document
        .getElementById("foods")
        .innerHTML = html;

    });

}

loadFoods();

</script>

</body>
</html>
